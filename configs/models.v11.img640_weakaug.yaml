# v11 tuning variant: larger input resolution with milder geometric augmentation.

epochs: 100
imgsz: 640
batch: 32

patience: 30
optimizer: auto
lr0: 0.01
weight_decay: 0.0005

cache: ram
use_attention: false
close_mosaic: 20
scale: 0.3
mosaic: 0.5

v11:
  model: checkpoints/yolo11n.pt
  attention_model: configs/architectures/yolo11n-cbam.yaml
  data: configs/data.caries.yaml
  project: runs/v11
  amp: false
