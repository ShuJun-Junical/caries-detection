# v11 tuning variant: 768 input with a slightly more conservative learning rate.

epochs: 100
imgsz: 768
batch: 24

patience: 30
optimizer: auto
lr0: 0.008
weight_decay: 0.0005

cache: ram
use_attention: false

v11:
  model: checkpoints/yolo11n.pt
  attention_model: configs/architectures/yolo11n-cbam.yaml
  data: configs/data.caries.yaml
  project: runs/v11
  amp: false
