# Consolidated configuration file.
# Top-level keys are shared training defaults. Per-family sections only
# contain model-specific overrides such as checkpoint path, dataset, and
# project/name.

# Shared training defaults (merged from hyp.base.yaml)
epochs: 100
imgsz: 512
batch: 64

# Optimization defaults
patience: 30
optimizer: auto
lr0: 0.01
weight_decay: 0.0005

# Runtime outputs
cache: ram
project: runs
use_attention: false

yolov5:
  model: checkpoints/yolov5s.pt
  data: configs/data.caries.yaml
  project: runs/yolov5
  name: caries-yolov5

yolov8:
  model: checkpoints/yolov8n.pt
  data: configs/data.caries.yaml
  project: runs/yolov8
  name: caries-yolov8
  amp: false

yolov11:
  model: checkpoints/yolo11n.pt
  data: configs/data.caries.yaml
  project: runs/yolov11
  name: caries-yolov11
  amp: false

latest:
  model: checkpoints/yolo26n.pt
  data: configs/data.caries.yaml
  project: runs/latest
  name: caries-latest
  amp: true
