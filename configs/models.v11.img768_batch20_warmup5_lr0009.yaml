# v11 tuning variant: 768 input with batch 20, longer warmup, and slightly lower learning rate.

epochs: 100
imgsz: 768
batch: 20

patience: 30
optimizer: auto
lr0: 0.009
weight_decay: 0.0005
warmup_epochs: 5

cache: ram
use_attention: false

v11:
  model: checkpoints/yolo11n.pt
  attention_model: configs/architectures/yolo11n-cbam.yaml
  data: configs/data.caries.yaml
  project: runs/v11
  amp: false
